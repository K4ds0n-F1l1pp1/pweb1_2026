<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Cadastral</title>
</head>
<body>
    <div align="center">
        <fieldset style="width: 700px;">

            <form>
                <h2 align="center">Ficha Cadastral</h2>
                
                <table border="0" align="center" cellpadding="5">
                    <tr>
                    <td>Nome:</td>
                    <td colspan="3">
                        <input type="text" size="60">
                    </td>
                    </tr>

                    <tr>
                    <td>RG:</td>
                    <td><input type="text" size="20"></td>
                    <td>C.P.F.:</td>
                    <td><input type="text" size="15"></td>
                    </tr>

                    <tr>
                    <td>Endereço:</td>
                    <td colspan="3">
                        <input type="text" size="60">
                    </td>
                    </tr>

                    <tr>
                    <td>Sexo:</td>
                    <td>
                        <select>
                        <option>Masculino</option>
                        <option>Feminino</option>
                        </select>
                    </td>
                    <td>Data Nascimento:</td>
                    <td><input type="text" size="15"></td>
                    </tr>

                    <tr>
                    <td>Situação Civil:</td>
                    <td colspan="3">
                        <input type="radio" name="civil"> Solteiro(a)
                        <input type="radio" name="civil"> Casado(a)
                        <input type="radio" name="civil"> Viúvo(a)
                        <input type="radio" name="civil"> Nem eu sei
                    </td>
                    </tr>

                    <tr>
                    <td colspan="4" align="center">
                        <br>
                        <input type="reset" value="Limpar Dados">
                    </td>
                    </tr>
                </table>
            </form>

        </fieldset>
    </div>
</body>
</html>
