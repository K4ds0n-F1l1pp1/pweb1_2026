<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula de Alunos</title>
</head>
<body style="margin: 18px;">
    <fieldset style="width: 500px;">
        <legend style="font-size: 28px;">MATRÍCULA DE ALUNOS</legend>

        <form action="./success.html">

            <fieldset style="width: 330px;">

                <legend><strong>INFORMAÇÕES CADASTRAIS</strong></legend>

                <label for="nome">Nome Completo: </label><br>
                <input type="text" maxlength="55" name="nome" required><br><br>

                <label for="dataNascimento">Data de Nascimento: </label><br>
                <input type="date" name="dataNascimento"><br><br>

                <label for="email">E-mail: </label><br>
                <input type="email" name="email" required><br><br>

                <label for="telefone">Digite seu telefone: </label><br>
                <input type="tel" id="telefone" name="telefone" pattern="[0-9]{10,12}" maxlength="12" required>

            </fieldset>

            <p style="font-size: 20px;"><strong>Série de Estudo: </strong></p>

            <select name="serie" required>
                <option value="#"></option>
                <option value="manha">1 Ano</option>
                <option value="tarde">2 Ano</option>
                <option value="noite">3 Ano</option>
                <option value="noite">4 Ano</option>
            </select>

            <p style="font-size: 20px;"><strong>Selecione um Turno: </strong></p>

            <input type="radio" name="turno" id="manha" value="manha" required>
            <label for="turno">Manhã</label>

            <input type="radio" name="turno" id="tarde" value="tarde" required>
            <label for="turno">Tarde</label>

            <input type="radio" name="turno" id="noite" value="noite" required>
            <label for="turno">Noite</label>

            <p style="font-size: 20px;"><strong>Selecione a(as) Atividades Extra-Curriculares: </strong></p>

            <input type="checkbox" id="teatro" name="atividade" value="teatro">
            <label for="teatro">Teatro</label>

            <input type="checkbox" id="musica" name="atividade" value="musica">
            <label for="musica">Música</label>

            <input type="checkbox" id="ballet" name="atividade" value="ballet">
            <label for="ballet">Ballet</label>

            <input type="checkbox" id="pintura" name="atividade" value="pintura">
            <label for="pintura">Pintura</label>

            <input type="checkbox" id="judo" name="atividade" value="judo">
            <label for="judo">Judô</label>

            <input type="checkbox" id="futebol" name="atividade" value="futebol">
            <label for="futebol">Futebol</label><br><br><br>

            <button>
                Enviar
            </button>

            <button style="margin-left: 12px;">
                <a href="./matricula.html" style="text-decoration: none; color: black;">Excluir</a>
            </button>

        </form>

    </fieldset>
</body>
</html>
